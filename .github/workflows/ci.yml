name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax
        run: python -m py_compile main.py

      - name: Run unit tests and save report
        run: |
          mkdir -p artifacts
          python -m unittest discover -s unit_tests -p "test*.py" -v > artifacts/test_report.txt 2>&1

      - name: Run coverage and save report
        run: |
          python -m pip install coverage
          python -m coverage run -m unittest discover -s unit_tests -p "test*.py"
          python -m coverage report > artifacts/coverage_report.txt

      - name: Upload test and coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: artifacts/