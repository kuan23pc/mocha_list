name: CI Artifacts and Release

on:
  push:
    branches:
      - main
      - artifacts-update
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: python -m py_compile main.py gui.py

      - name: Install coverage
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage

      - name: Run unit tests with coverage
        run: python -m coverage run -m unittest discover -s unit_tests -p "test*.py" -v

      - name: Generate HTML coverage report
        run: python -m coverage html --title="CALM List Coverage Report" -d artifacts/html-coverage-report

      - name: Create coverage summary page
        run: |
          cat > artifacts/html-coverage-report/coverage-summary.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>CALM List Coverage Summary</title>
          </head>
          <body style="font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto;">
            <h1>CALM List - Coverage Report</h1>
            <p>This folder contains the generated HTML coverage report.</p>
            <p><a href="index.html">Open Full Coverage Report</a></p>
          </body>
          </html>
          EOF

      - name: Clean coverage report (remove png, js, css)
        run: |
          find artifacts/html-coverage-report -name "*.png" -delete
          find artifacts/html-coverage-report -name "*.js" -delete
          find artifacts/html-coverage-report -name "*.css" -delete

      - name: Zip coverage report
        run: |
          cd artifacts
          zip -r html-coverage-report.zip html-coverage-report

      - name: Create deployable project package
        run: |
          mkdir -p artifacts/project/app
          mkdir -p artifacts/project/tests
          mkdir -p artifacts/project/docs
          mkdir -p artifacts/project/ci

          cp main.py artifacts/project/app/
          cp gui.py artifacts/project/app/

          if [ -f tasks.json ]; then cp tasks.json artifacts/project/app/; fi
          if [ -f README.md ]; then cp README.md artifacts/project/docs/; fi

          cp -r unit_tests artifacts/project/tests/
          cp -r .github artifacts/project/ci/

          cd artifacts
          zip -r project-files-${{ github.run_number }}.zip project

      - name: Upload deployable artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-files-${{ github.run_number }}
          path: artifacts/project-files-${{ github.run_number }}.zip
          retention-days: 30

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report-${{ github.run_number }}
          path: artifacts/html-coverage-report.zip
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release package
        run: |
          mkdir release

          cp main.py release/
          cp gui.py release/

          if [ -f tasks.json ]; then cp tasks.json release/; fi
          if [ -f README.md ]; then cp README.md release/; fi

          zip -r calm-list-${{ github.ref_name }}.zip release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: calm-list-${{ github.ref_name }}.zip
          body: Automated release created by GitHub Actions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}