name: Check syntax and create artifacts

on:
  push:
    branches:
      - main
      - artifacts-update
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: python -m py_compile main.py gui.py

      - name: Install coverage
        run: python -m pip install coverage

      - name: Run unit tests with coverage
        run: python -m coverage run -m unittest discover -s unit_tests -p "test*.py" -v

      - name: Generate HTML coverage report
        run: python -m coverage html --title="CALM List Coverage Report" -d artifacts/html-coverage-report

      - name: Add coverage README
        run: |
          echo "HTML Coverage Report" > artifacts/html-coverage-report/README.txt
          echo "Open index.html in a browser to view the coverage report." >> artifacts/html-coverage-report/README.txt

      - name: Zip HTML coverage report
        run: |
          cd artifacts
          zip -r html-coverage-report.zip html-coverage-report

      - name: Create organized project zip
        run: |
          mkdir -p artifacts/project/app
          mkdir -p artifacts/project/tests
          mkdir -p artifacts/project/ci
          mkdir -p artifacts/project/docs

          cp main.py artifacts/project/app/
          cp gui.py artifacts/project/app/

          if [ -f tasks.json ]; then cp tasks.json artifacts/project/app/; fi
          if [ -f icon.png ]; then cp icon.png artifacts/project/app/; fi
          if [ -f README.md ]; then cp README.md artifacts/project/docs/; fi

          cp -r unit_tests artifacts/project/tests/
          cp -r .github artifacts/project/ci/

          cd artifacts
          zip -r project-files.zip project

      - name: Upload project files artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-files
          path: artifacts/project-files.zip

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: artifacts/html-coverage-report.zip