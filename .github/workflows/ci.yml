name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax
        run: python -m py_compile main.py

      - name: Install coverage
        run: python -m pip install coverage

      - name: Run unit tests with coverage
        run: python -m coverage run -m unittest discover -s unit_tests -p "test*.py"

      - name: Generate HTML coverage report
        run: python -m coverage html

      - name: Organize artifacts (clean & structured)
        run: |
          mkdir -p artifacts/project
          mkdir -p artifacts/coverage

          # Project files
          cp main.py artifacts/project/
          cp gui.py artifacts/project/
          cp -r unit_tests artifacts/project/
          cp -r .github artifacts/project/
          if [ -f README.md ]; then cp README.md artifacts/project/; fi
          if [ -f icon.png ]; then cp icon.png artifacts/project/; fi

          # Coverage files (exclude unnecessary images)
          rsync -av --exclude="*.png" htmlcov/ artifacts/coverage/

          # Zip project
          cd artifacts
          zip -r project-files.zip project

      - name: Upload project zip
        uses: actions/upload-artifact@v4
        with:
          name: project-files
          path: artifacts/project-files.zip

      - name: Upload clean coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage/