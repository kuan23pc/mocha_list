name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax
        run: python -m py_compile main.py

      - name: Install coverage
        run: python -m pip install coverage

      - name: Run unit tests with coverage (only app files)
        run: python -m coverage run --source=main,gui -m unittest discover -s unit_tests -p "test*.py"

      - name: Generate HTML coverage report
        run: python -m coverage html

      - name: Organize artifacts (clean & structured)
        run: |
          mkdir -p artifacts/project/app
          mkdir -p artifacts/project/tests
          mkdir -p artifacts/project/ci
          mkdir -p artifacts/project/docs
          mkdir -p artifacts/coverage

          # App files
          cp main.py artifacts/project/app/
          cp gui.py artifacts/project/app/
          if [ -f icon.png ]; then cp icon.png artifacts/project/app/; fi

          # Tests
          cp -r unit_tests artifacts/project/tests/

          # CI config
          cp -r .github artifacts/project/ci/

          # Docs
          if [ -f README.md ]; then cp README.md artifacts/project/docs/; fi

          # Coverage (keep full HTML report)
          cp -r htmlcov/* artifacts/coverage/

          # Zip project
          cd artifacts
          zip -r project-files.zip project

      - name: Upload project zip
        uses: actions/upload-artifact@v4
        with:
          name: project-files
          path: artifacts/project-files.zip

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage/